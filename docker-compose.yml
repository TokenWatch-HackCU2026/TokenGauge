services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    working_dir: /app/backend
    environment:
      - PORT=3001
      - DB_NAME=tokengauge
      - MONGO_URI=mongodb://mongo:27017
      - REDIS_URL=redis://redis:6379
      - SEED_ON_START=true
      - SEED_EMAIL=${SEED_EMAIL:-test@tokengauge.dev}
      - SEED_PASSWORD=${SEED_PASSWORD:-password123}
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    depends_on:
      - mongo
      - redis
    entrypoint: ["/app/backend/entrypoint.sh"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "3001", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
